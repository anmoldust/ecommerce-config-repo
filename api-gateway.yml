spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**
          # ❌ REMOVE FILTER FOR NOW

management:
  endpoints:
    web:
      exposure:
        include: "*"
