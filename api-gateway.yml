spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: JwtAuthenticationFilter   # ✅ IMPORTANT
            
management:
  endpoints:
    web:
      exposure:
        include: "*"

management.endpoint.gateway.enabled: true
